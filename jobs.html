<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Root base so /jobs/<theme> deep-links resolve assets (css/js) + links from site root -->
  <base href="/">
  <title>StillUnemployed.com — Roles I'd actually apply to</title>
  <meta name="description" content="Roles here are opened and checked by a human (me). No AI slop, just jobs I'd actually apply to.">
  <!-- SHARE PREVIEW (og:image) — the ORIGINAL theme board. Crawlers read raw HTML and do NOT run JS,
       so the theme in the preview can't be swapped client-side. That's why each /jobs/<theme> URL gets
       its OWN generated page with its OWN og:image (see scripts/gen-share.mjs → theme board pages). -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="StillUnemployed.com">
  <meta property="og:title" content="Roles I'd actually apply to">
  <meta property="og:description" content="Opened and checked by a human (me). Every role has a real salary. No AI slop.">
  <meta property="og:url" content="https://stillunemployed.com/jobs">
  <meta property="og:image" content="https://stillunemployed.com/assets/og/original.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Roles I'd actually apply to">
  <meta name="twitter:description" content="Opened and checked by a human (me). Every role has a real salary. No AI slop.">
  <meta name="twitter:image" content="https://stillunemployed.com/assets/og/original.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Black Ops One powers the WW2 "Change Look?" theme label (falls back to Archivo Black) -->
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=11">
  <!-- Pre-apply the saved "Change Look?" theme before paint to avoid a color flash -->
  <script>
    (function () {
      // Shareable theme URLs: /jobs/casino, /jobs/blackcat, /jobs/girlies … (also ?theme=casino).
      // A slug in the URL forces + persists that theme; otherwise fall back to the saved theme.
      var SLUG2LOOK = { original:'original', casino:'poker', poker:'poker', girlies:'girly',
        girly:'girly', mermaid:'mermaid', mermaidcore:'mermaid', bratt:'bratt', brat:'bratt',
        blackcat:'noir', 'black-cat':'noir', noir:'noir', beauty:'beauty', chess:'chess' };
      var VALID = { girly:1, poker:1, mermaid:1, bratt:1, noir:1, beauty:1, chess:1 };
      function fromUrl() {
        try {
          var m = location.pathname.match(/\/jobs\/([A-Za-z0-9_-]+)/);
          var slug = (m && m[1]) ? m[1].toLowerCase() : '';
          if (!slug && location.search) {
            var q = new URLSearchParams(location.search).get('theme');
            slug = q ? q.toLowerCase() : '';
          }
          return (slug && SLUG2LOOK[slug]) ? SLUG2LOOK[slug] : '';
        } catch (e) { return ''; }
      }
      try {
        var urlLook = fromUrl();
        if (urlLook) { try { localStorage.setItem('su_look', urlLook); } catch (e) {} }
        var v = urlLook || localStorage.getItem('su_look');
        if (v && VALID[v]) {
          document.documentElement.setAttribute('data-su-look', v);
          document.addEventListener('DOMContentLoaded', function () {
            document.body.className = 'theme-' + v;
            var b = document.getElementById('board');
            if (b) b.className = 'board ' + v;
          });
        }
      } catch (e) {}
    })();
  </script>
  <!-- First-party analytics: defer keeps document order, so this runs BEFORE js/app.js -->
  <script src="js/analytics.js?v=an3" defer></script>
  <!-- Google Analytics 4 (consent-gated, loads only after Accept) -->
  <script src="js/ga.js?v=1" defer></script>
</head>
<body>
  <!-- The board is rendered by js/app.js from jobs-data.json, reproducing the exact
       markup the original Manus template produced. Edit jobs-data.json to add/remove roles. -->
  <div data-screen-label="Jobs" class="board" id="board" style="min-height: 100vh; font-family: 'Poppins', system-ui, sans-serif; color: #2C2118; padding-bottom: 90px;"></div>

  <!-- Modals / popups get appended here at runtime -->
  <div id="overlay-root"></div>

  <style>
    .site-footer { text-align: center; padding: 26px 16px 46px; font-family: 'Poppins', system-ui, sans-serif; font-size: 13px; color: #6F5E45; }
    .site-footer span { opacity: .9; }
    .site-footer a { color: #6F5E45; text-decoration: none; margin: 0 9px; border-bottom: 1px solid rgba(111,94,69,.4); }
    .site-footer a:hover { color: #2C2118; border-color: #2C2118; }
    /* Board header subtitle: shown on desktop, hidden on mobile for a cleaner hero (board goes mobile at 700px) */
    @media (max-width: 700px) {
      .board-subtitle { display: none; }
    }
  </style>
  <footer class="site-footer">
    <span>&copy; 2026 Elevate Media Technologies LLC</span> &nbsp;&middot;&nbsp;
    <a href="./privacy.html">Privacy Policy</a>
    <a href="./terms.html">Terms of Service</a>
  </footer>

  <script src="js/app.js?v=app31" defer></script>
  <!-- Google sign-in + cross-device sync. HARD-GATED OFF on stillunemployed.com (see js/auth.js). -->
  <script type="module" src="js/auth.js?v=auth3"></script>
</body>
</html>
