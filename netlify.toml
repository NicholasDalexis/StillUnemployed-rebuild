# StillUnemployed.com — static site, no build step.
# Netlify just serves the repo root as-is.
[build]
  publish = "."

# ── Netlify secrets scanning (2026-07-12) ──────────────────────────────────────────────────────
# Netlify scans the build output for anything that looks like a credential and FAILS THE DEPLOY if
# it finds one. It flagged `apiKey` in js/auth.js and blocked two builds. That is the scanner doing
# exactly its job, and the default should stay ON.
#
# This ONE file is a real exception. A Firebase **web config** (apiKey / authDomain / projectId /
# appId) is a PUBLIC IDENTIFIER, not a secret — Google's own docs say to ship it in client-side JS.
# It grants nothing on its own. The actual security for this feature is:
#   1. Firestore rules  — a user can only read/write `users/{their own uid}`; everything else denied.
#   2. Authorized domains — only `localhost` + `preview--stillunemployed.netlify.app` can sign in.
#      stillunemployed.com is deliberately NOT authorized.
#   3. js/auth.js hard-gates itself off on the production hostname.
#
# Scoped to the single path, so a REAL secret leaking anywhere else in the repo still fails the build.
# If this ever needs to cover a second file, stop and think about why first.
[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "js/auth.js"
  # Generate the static per-job share pages + Post-it OG images from the live sheet.
  # gen-share.mjs      = per-JOB share pages + Post-it OG images (/j/**)
  # gen-theme-pages.mjs = per-THEME board pages (/jobs/<theme>/index.html), each with its own
  #                      og:image, so sharing /jobs/casino previews the CASINO board. Crawlers
  #                      don't run JS, so this cannot be done client-side. Kept separate because
  #                      gen-share exits early if the Google Sheet is unreachable.
  command = "node scripts/gen-share.mjs && node scripts/gen-theme-pages.mjs"

# Shipped Jun 28 2026: fully disable Netlify post-processing (belt + suspenders
# to the class-based nav fix, so future quoted inline styles can never break).
# THE REAL FIX. Netlify post-processing was rewriting internal links
# (href="./index.html" -> "/") and re-serializing those <a> tags with
# single quotes + backslash-escaped inner quotes, which broke the inline
# styles on Home/Jobs/CTA. Advice's link is external so it was left alone.
# Turn ALL post-processing off so deploys serve our files byte-for-byte.
[build.processing]
  skip_processing = true

# ── FIREBASE AUTH PROXY (2026-07-12) — THIS IS WHAT MAKES SIGN-IN ACTUALLY WORK ────────────────
# THE BUG IT FIXES: Firebase brokers the auth session through a hidden iframe on
# stillunemployed-17de9.firebaseapp.com — a DIFFERENT ORIGIN from this site. Chrome now partitions
# third-party storage, so the session gets written under Firebase's origin and OUR origin cannot
# read it back. Symptoms Nic hit, all from this one cause:
#   · signInWithPopup threw a bare `auth/internal-error`
#   · after a redirect sign-in he WAS signed in with Google, but the site still showed "Sign in"
#   · saved jobs never synced between his laptop and his phone (no user = no Firestore write)
#
# THE FIX (Firebase's own recommendation): proxy the auth handler through OUR domain, so the whole
# flow is SAME-ORIGIN and nothing is third-party. Then set authDomain to this host (see js/auth.js).
# Bonus: the Google consent screen then shows OUR domain instead of "stillunemployed-17de9.firebaseapp.com".
#
# MUST come before the /jobs/* rule — Netlify applies redirects in file order and `force = true`
# means this wins even though /__/auth/* is not a real file on disk.
[[redirects]]
  from = "/__/auth/*"
  to = "https://stillunemployed-17de9.firebaseapp.com/__/auth/:splat"
  status = 200
  force = true

# Theme deep-links (added Jul 8 2026): /jobs/casino, /jobs/blackcat, /jobs/girlies, etc.
# all serve the board (jobs.html) with the URL preserved (status 200 = rewrite, not redirect).
# The pre-paint script in jobs.html reads the slug and applies that theme before first paint,
# so a shared link opens straight into that theme. jobs.html uses <base href="/"> so its
# relative assets still resolve correctly under the deeper /jobs/* path.
[[redirects]]
  from = "/jobs/*"
  to = "/jobs.html"
  status = 200

# Security headers (apply to everything). Hardening for a static site: block
# framing/clickjacking, MIME-sniffing, and referrer leakage, lock down unused
# browser features, and restrict resource origins via CSP (only self + the
# Google Sheets backend + Google Fonts are allowed).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # frame-src (added 2026-07-12): the newsletter signup in the job-detail popup is a Beehiiv IFRAME
    # (app.js -> subscribe-forms.beehiiv.com). There was no frame-src and no child-src, so frames fell
    # back to `default-src 'self'` and the browser REFUSED to load it. Localhost has no CSP headers at
    # all, so it worked perfectly in dev and would have been silently dead in prod — the signup box
    # just... wouldn't be there. Scoped to the exact Beehiiv host, nothing wider.
    # frame-ancestors 'none' still stands: others can't embed US, we can embed Beehiiv. Different rule.
    # FIREBASE hosts added 2026-07-12 for Google sign-in (js/auth.js). Learned the hard way from the
    # Beehiiv iframe: localhost serves NO CSP, so anything CSP blocks works perfectly in dev and is
    # silently dead once deployed. Adding these before the first preview deploy, not after.
    #   www.gstatic.com          -> the Firebase SDK modules (script-src)
    #   identitytoolkit/securetoken/firestore .googleapis.com -> auth + data (connect-src)
    #   accounts.google.com + the project's firebaseapp.com -> the sign-in popup (frame-src)
    # NOTE: js/auth.js hard-gates itself OFF on stillunemployed.com, so production never contacts
    # any of these. Allowing a host the live site never talks to costs nothing; a CSP is a ceiling,
    # not a floor. The alternative (a second, preview-only CSP) is a second thing to keep in sync,
    # and this repo has been bitten three times by exactly that.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://www.google-analytics.com https://www.googletagmanager.com https://lh3.googleusercontent.com; connect-src 'self' https://docs.google.com https://script.google.com https://script.googleusercontent.com https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com https://www.googletagmanager.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firestore.googleapis.com https://www.gstatic.com; frame-src 'self' https://subscribe-forms.beehiiv.com https://accounts.google.com https://*.firebaseapp.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"

# Why fixes kept "not showing" before: the browser/CDN served cached OLD
# html/css/js, so deploys looked like they did nothing. Force these to
# revalidate on every load, so what you deploy is always what you see.
# (Fonts/images in /assets keep normal caching since they don't change.)
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
